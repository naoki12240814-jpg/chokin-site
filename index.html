<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banshaku Site</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

/* ===== 上のメイン ===== */
.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px;
  gap: 40px;
}

.hero img {
  width: 50%;
  border-radius: 10px;
}

.hero-text {
  width: 40%;
}

.hero-text h1 {
  font-size: 2em;
}

.hero-text p {
  opacity: 0.8;
}

.button {
  display: inline-block;
  padding: 10px 20px;
  background: orange;
  color: black;
  text-decoration: none;
  margin-top: 10px;
  border-radius: 5px;
}

/* ===== 下のカード ===== */
.section {
  background: #eee;
  color: black;
  padding: 40px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 200px;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0 5px;
}
  @media (max-width: 768px) {
  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero img {
    width: 90%;
  }

  .hero-text {
    width: 90%;
  }
}

</style>
</head>

  <body>
  <div class="hero">

    <img src="file_00000000f93c7209a9ac573acba3e940.png">

    <div class="hero-text">
      <h1>Long day...</h1>

      <p>
        This is called “banshaku” <br>(晩酌).<br><br>
        A simple meal. A quiet drink.<br>
        That’s how we end the day in Japan.<br><br>
        Not perfect. Just right.<br><br>
        Try it tonight.
      </p>

      <a href="#" class="button">Watch how I do it</a>
    </div>

  </div>

  <!-- ===== 下のカード ===== -->
  <div class="section">

  <h2>Try Japanese Food</h2>

  <div class="cards">

    <!-- ① -->
    <div class="card">
      <img src="yakitori.jpg">
      <h3>Yakitori</h3>
      <a href="#" class="button">See</a>
    </div>

    <!-- ② -->
    <div class="card">
      <img src="gyoza.jpg">
      <h3>Gyoza</h3>
      <a href="#" class="button">See</a>
    </div>

    <!-- ③ -->
    <div class="card">
      <img src="ramen.jpg">
      <h3>Ramen</h3>
      <a href="#" class="button">See</a>
    </div>

    <!-- ④ -->
    <div class="card">
      <img src="oden.jpg">
      <h3>Oden</h3>
      <a href="#" class="button">See</a>
    </div>

  </div>

</div>

</body>
</html>
